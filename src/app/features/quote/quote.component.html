<div class="min-h-[80vh] flex items-center justify-center px-4">
    <p-card class="max-w-xl w-full text-center shadow-2xl">

        <div class="flex justify-center mb-5">
            <div class="w-20 h-20 rounded-full bg-purple-100 flex items-center justify-center">
                <i class="pi pi-cog text-5xl text-purple-600"></i>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-gray-800 mb-3">
            Calculadora em construção
        </h1>

        <p class="text-gray-600 leading-7 mb-6">
            Estamos finalizando uma nova experiência para facilitar a criação
            dos seus orçamentos. Em breve ela estará disponível aqui.
        </p>

        <p class="text-gray-500 mb-8">
            Enquanto isso, você pode continuar utilizando a versão atual clicando
            no botão abaixo.
        </p>

        <p-button
            label="Abrir Orc Tattoo"
            icon="pi pi-external-link"
            severity="help"
            size="large"
            (onClick)="openPage()">
        </p-button>

        <div class="mt-8 text-sm text-gray-400">
            Em breve...
        </div>

    </p-card>
</div>
